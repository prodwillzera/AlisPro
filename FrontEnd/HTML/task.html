<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AlisPro – Sistema de Tarefas Acadêmicas</title>
        <link rel="stylesheet" href="../CSS/styleData.css">
        <link rel="stylesheet" href="../CSS/global.css">
        <link rel="stylesheet" href="../CSS/task/index.css">
    </head>
    <body>
        <header>
            <span id="title">AlisPro</span>
            <span id="info">Sistema de Tarefas Acadêmicas</span>
            <span id="userName">USER</span>
        </header>

        <main>
            <section class="main-card">
               <h1 id="mainTitle" class="main-title">Tarefa</h1>

               <div class="main-field">
                    <label>Nome da tarefa:</label>
                    <input id="taskTitle" placeholder="Tarefa..." maxlength="60" type="text"></input>
               </div>
               
               <div class="main-field">
                    <label>Descrição:</label>
                    <textarea id="taskDescription" placeholder="Descrição da tarefa..." maxlength="4000"></textarea>
               </div>

               <div class="main-field">
                    <label>Prazo: <input id="taskDate" type="date"></input></label>
               </div>

               <div class="main-field">
                    <label>Prioridade: 
                        <select id="taskPriority">
                            <option value="high">Alta</option>
                            <option value="medium">Médio</option>
                            <option value="low">Baixo</option>
                        </select>
                    </label>
               </div>

               <div class="main-field">
                    <label>
                        <label class="checkbox">
                            Tarefa concluida: 
                            <input id="taskCompleted" type="checkbox" />
                            <span class="checkmark"></span>
                        </label>
                    </label>
               </div>

               <div id="errorAlert" class="main-field alert">
                    <label>ERROR</label>
                </div>

               <div class="main-field">
                    <button id="saveTaskButton">Salvar Tarefa</button>
                    <button id="cancelButton">Cancelar</button>
               </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 – William Lopes Batista – Tomás Müller de Carvalho – Wellington Felipe Ribeiro</p>
        </footer>

        <script type="module" src="../JS/index.js"></script>
        <script type="module" src="../JS/task/index.js"></script>
    </body>
</html>
