<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlisPro – Sistema de Tarefas Acadêmicas</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
  <div id="page-ver-todas" class="page">

    <nav class="navbar">
      <span class="navbar__logo">AlisPro</span>
      <span class="navbar__center">Sistema de Tarefas Acadêmicas</span>
      <div class="navbar__search" aria-label="Pesquisar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
    </nav>

    <main class="all-tasks-wrapper">
      <div class="all-tasks-card">

        <div class="all-tasks-card__header">
          <h2 class="dashboard-card__title">ALISPRO</h2>
          <div aria-label="Perfil do usuário">
            <svg class="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
          </div>
        </div>

        <div class="search-bar" role="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
          <input type="text" placeholder="Search" aria-label="Pesquisar tarefas" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </div>

        <div class="table-header" role="row">
          <div aria-label="Status">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
          </div>
          <span>Títulos</span>
          <span>Ações</span>
          <span>Prazo</span>
        </div>

        <ul class="all-tasks-list" role="list">

          <li class="all-task-row" role="listitem">
            <div class="task-checkbox" aria-label="Tarefa não concluída"></div>

            <div class="task-info">
              <p class="task-info__name">Trabalho de Banco de Dados</p>
              <p class="task-info__priority">
                Prioridade: <span class="priority-alta">Alta</span>
              </p>
            </div>

            <div class="task-actions" role="group" aria-label="Ações da tarefa">
              <button class="action-btn" aria-label="Excluir tarefa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
              <button class="action-btn" aria-label="Editar tarefa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <line x1="3" y1="9" x2="21" y2="9" />
                  <line x1="9" y1="21" x2="9" y2="9" />
                </svg>
              </button>
            </div>

            <div class="task-date-right" aria-label="Prazo: 19/05/2026">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
              19/05/2026
            </div>
          </li>

          <li class="all-task-row" role="listitem">
            <div class="task-checkbox" aria-label="Tarefa não concluída"></div>

            <div class="task-info">
              <p class="task-info__name">Trabalho de Banco de Dados</p>
              <p class="task-info__priority">
                Prioridade: <span class="priority-media">Média</span>
              </p>
            </div>

            <div class="task-actions" role="group" aria-label="Ações da tarefa">
              <button class="action-btn" aria-label="Excluir tarefa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
              <button class="action-btn" aria-label="Editar tarefa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <line x1="3" y1="9" x2="21" y2="9" />
                  <line x1="9" y1="21" x2="9" y2="9" />
                </svg>
              </button>
            </div>

            <div class="task-date-right" aria-label="Prazo: 12/05/2026">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
              12/05/2026
            </div>
          </li>

          <li class="all-task-row" role="listitem">
            <div class="task-checkbox checked" aria-label="Tarefa concluída">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </div>

            <div class="task-info">
              <p class="task-info__name">Trabalho de Banco de Dados</p>
              <p class="task-info__priority">
                Prioridade: <span class="priority-media">Média</span>
              </p>
            </div>

            <div class="task-actions" role="group" aria-label="Ações da tarefa">
              <button class="action-btn" aria-label="Excluir tarefa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
              <button class="action-btn" aria-label="Editar tarefa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <line x1="3" y1="9" x2="21" y2="9" />
                  <line x1="9" y1="21" x2="9" y2="9" />
                </svg>
              </button>
            </div>

            <div class="task-date-right" aria-label="Tarefa concluída">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9" />
                <polyline points="9 12 11 14 15 10" />
              </svg>
              Concluída
            </div>
          </li>

        </ul>
      </div>
    </main>

  </div>
</body>

</html>
