<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlisPro – Sistema de Tarefas Acadêmicas</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
  <div id="page-nova-tarefa" class="page">

    <nav class="navbar">
      <span class="navbar__logo">AlisPro</span>
      <span class="navbar__center">Sistema de Tarefas Acadêmicas</span>
      <div class="navbar__search" aria-label="Pesquisar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
    </nav>

    <main class="new-task-wrapper">
      <div class="new-task-card">

        <h1 class="new-task-card__title">Nova Tarefa</h1>

        <div class="field-block">
          <label for="nome-tarefa">Nome da tarefa:</label>
          <input type="text" id="nome-tarefa" placeholder="Tarefa..." />
        </div>

        <div class="field-block">
          <label for="descricao-tarefa">Descrição:</label>
          <textarea id="descricao-tarefa" placeholder="Descrição da tarefa..."></textarea>
        </div>

        <div class="prazo-row">
          <label>Prazo:</label>
          <div class="prazo-pill" aria-label="Data do prazo">
            <input type="date" value="2025-04-01"
              style="border:none;background:transparent;font-size:0.85rem;color:#333;outline:none;" />
          </div>
          <div class="prazo-pill" aria-label="Hora do prazo">
            <input type="time" value="09:41"
              style="border:none;background:transparent;font-size:0.85rem;color:#333;outline:none;" />
          </div>
        </div>

        <div class="prioridade-block">
          <label>Prioridade:</label>
          <div class="prioridade-options" role="group" aria-label="Nível de prioridade">

            <label class="prioridade-option">
              <input type="checkbox" name="prioridade" value="alta" checked />
              Alta
            </label>

            <label class="prioridade-option">
              <input type="checkbox" name="prioridade" value="media" checked />
              Media
            </label>

            <label class="prioridade-option">
              <input type="checkbox" name="prioridade" value="baixa" checked />
              Baixa
            </label>

          </div>
        </div>

        <div class="new-task-footer">
          <a href="dashboard.html">
              <button class="btn-primary">
                  Enviar tarefa
              </button>
          </a>
        </div>

      </div>
    </main>

    <footer class="footer">
      AlisPro © 2026 – William Lopes Batista – Tomás Müller de Carvalho – Wellington Felipe Ribeiro
    </footer>
  </div>

</body>

</html>
