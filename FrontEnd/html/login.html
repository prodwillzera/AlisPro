<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AlisPro – Sistema de Tarefas Acadêmicas</title>
        <link rel="stylesheet" href="../CSS/styleData.css">
        <link rel="stylesheet" href="../CSS/global.css">
        <link rel="stylesheet" href="../CSS/login/index.css">
    </head>
    <body>
        <header>
            <span id="title">AlisPro</span>
            <span id="info">Sistema de Tarefas Acadêmicas</span>
        </header>

        <main>
            <section class="login-card login">
                <h1 class="login-title">Login</h1>
                <p class="login-subtitle">Digite seu Email e Senha</p>

                <div class="login-field">
                    <label>Email</label>
                    <input value="wfr@gmail.com" type="email" placeholder="seu@email.com" id="loginEmailInput" />
                </div>

                <div class="login-field">
                    <label>Senha</label>
                    <input value="12345678" type="password" placeholder="••••••••" id="loginPasswordInput" />
                </div>

                <div class="login-field alert login">
                    <label>ERROR</label>
                </div>

                <button class="login-button" id="loginButton">Entrar</button>

                <p class="login-footer-text">
                    Não tem uma conta? <button id="createAccountPageButton">Criar conta</button>
                </p>
            </section>

            <section class="login-card register">
                <h1 class="login-title">Registrar</h1>
                <p class="login-subtitle">Digite seu Email e Senha</p>

                <div class="login-field">
                    <label>Email</label>
                    <input type="email" placeholder="seu@email.com" id="registerEmailInput" />
                </div>

                <div class="login-field">
                    <label>Senha</label>
                    <input type="password" placeholder="••••••••" id="registerPasswordInput" />
                </div>

                <div class="login-field">
                    <label>Repetir Senha</label>
                    <input type="password" placeholder="••••••••" id="registerRepeatPasswordInput" />
                </div>

                <div class="login-field alert register">
                    <label>ERROR</label>
                </div>

                <button class="login-button" id="registerButton">Criar Conta</button>

                <p class="login-footer-text">
                    Já tem uma conta? <button id="loginPageButton">Fazer login</button>
                </p>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 – William Lopes Batista – Tomás Müller de Carvalho – Wellington Felipe Ribeiro</p>
        </footer>

        <script type="module" src="../JS/login/index.js"></script>
    </body>
</html>
